llm:
  provider: ollama
  model: llama3.2
  temperature: 0.2

embeddings:
  provider: ollama
  model: nomic-embed-text

vector_store:
  provider: chroma
  persist_directory: .zori/chroma

ingestion:
  mode: batch
  sync_on_startup: false
  chunk_size: 1000
  chunk_overlap: 200

zotero:
  library_type: user
